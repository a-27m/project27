---
name: Reusable Semantic Versioning and Tagging

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Name of the service being versioned'
        required: true
        type: string
    outputs:
      version:
        description: 'Generated semantic version'
        value: ${{ jobs.semver.outputs.version }}
      major:
        description: 'Major version number'
        value: ${{ jobs.semver.outputs.major }}
      minor:
        description: 'Minor version number'
        value: ${{ jobs.semver.outputs.minor }}
      patch:
        description: 'Patch version number'
        value: ${{ jobs.semver.outputs.patch }}

permissions:
  contents: write

jobs:
  semver:
    name: Generate Version for ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    concurrency:
      group: semver-tag-${{ github.run_id }}
      cancel-in-progress: false
    outputs:
      version: ${{ steps.gitversion.outputs.semVer }}
      major: ${{ steps.gitversion.outputs.major }}
      minor: ${{ steps.gitversion.outputs.minor }}
      patch: ${{ steps.gitversion.outputs.patch }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # Required for GitVersion

      - name: Set up GitVersion
        uses: gittools/actions/gitversion/setup@v4.7.0
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.7.0
        with:
          configFilePath: .github/GitVersion.yaml

      - name: Display version info
        run: |
          echo "SemVer: ${{ steps.gitversion.outputs.semVer }}"
          echo "Major: ${{ steps.gitversion.outputs.major }}"
          echo "Minor: ${{ steps.gitversion.outputs.minor }}"
          echo "Patch: ${{ steps.gitversion.outputs.patch }}"
          echo "FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}"
          echo "InformationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}"

      - name: Create and push tag
        if: github.ref == 'refs/heads/main'
        run: |
          VERSION="${{ steps.gitversion.outputs.semVer }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create annotated tag if it doesn't exist
          if ! git rev-parse "v$VERSION" >/dev/null 2>&1; then
            git tag -a "v$VERSION" -m "Release version $VERSION"
            git push origin "v$VERSION"
            echo "Created and pushed tag v$VERSION"
          else
            echo "Tag v$VERSION already exists, skipping"
          fi
