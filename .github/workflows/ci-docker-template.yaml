---
name: CI Template - Docker Build & Publish

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Service name (defaults to repository name)'
        required: false
        type: string
        default: ''
      image-name:
        description: 'Docker image name (defaults to ghcr.io/{org}/{lowercase-service-name})'
        required: false
        type: string
        default: ''
      dotnet-version:
        description: '.NET SDK version'
        required: false
        type: string
        default: '10.0.x'
      dockerfile-path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      build-context:
        description: 'Path to use as the build context'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'

permissions:
  contents: write
  packages: write

jobs:
  setup:
    name: Configuration
    runs-on: ubuntu-latest
    outputs:
      service-name: ${{ steps.config.outputs.service-name }}
      service-name-lower: ${{ steps.config.outputs.service-name-lower }}
      image-name: ${{ steps.config.outputs.image-name }}
    steps:
      - name: Compute configuration
        id: config
        run: |
          SERVICE_NAME="${{ inputs.service-name || github.event.repository.name }}"
          SERVICE_NAME_LOWER=$(echo "$SERVICE_NAME" | tr '[:upper:]' '[:lower:]')
          IMAGE_NAME="${{ inputs.image-name }}"

          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME="ghcr.io/${{ github.repository_owner }}/${SERVICE_NAME_LOWER}"
          fi

          echo "service-name=$SERVICE_NAME" >> $GITHUB_OUTPUT
          echo "service-name-lower=$SERVICE_NAME_LOWER" >> $GITHUB_OUTPUT
          echo "image-name=$IMAGE_NAME" >> $GITHUB_OUTPUT

          echo "Service: $SERVICE_NAME"
          echo "Service (lowercase): $SERVICE_NAME_LOWER"
          echo "Image: $IMAGE_NAME"

  semver:
    name: Version
    if: github.ref == 'refs/heads/main'
    needs: [setup]
    uses: ./.github/workflows/semver-tag.yaml
    permissions:
      contents: write
    with:
      service-name: ${{ needs.setup.outputs.service-name }}

  build-docker:
    name: Docker Build
    if: github.ref == 'refs/heads/main'
    needs: [setup, semver]
    uses: ./.github/workflows/build-docker.yaml
    permissions:
      contents: read
      packages: write
    with:
      service-name: ${{ needs.setup.outputs.service-name }}
      image-name: ${{ needs.setup.outputs.image-name }}
      dockerfile-path: ${{ inputs.dockerfile-path }}
      build-context: ${{ inputs.build-context }}
      platforms: ${{ inputs.platforms }}
      image-tag: ${{ needs.semver.outputs.version }}
