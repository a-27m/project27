---
name: Reusable Docker Build & Push

on:
  workflow_call:
    inputs:
      service-name:
        description: 'Name of the service being built'
        required: true
        type: string
      image-name:
        description: 'Docker image name (without tag)'
        required: true
        type: string
      dockerfile-path:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      build-context:
        description: 'Docker build context path'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Target platforms (comma-separated)'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      image-tag:
        description: 'Image tag to use'
        required: true
        type: string
    outputs:
      image-digest:
        description: 'Docker image digest'
        value: ${{ jobs.build-push.outputs.digest }}

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: Build and Push ${{ inputs.service-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.image-name }}
          tags: |
            type=raw,value=${{ inputs.image-tag }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},value=${{ inputs.image-tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.image-tag }}
            type=semver,pattern={{major}},value=${{ inputs.image-tag }},enable=${{ !startsWith(inputs.image-tag, '0.') }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.build-context }}
          file: ${{ inputs.dockerfile-path }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDTIME=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.created'] }}
            VERSION=${{ inputs.image-tag }}
            REVISION=${{ fromJSON(steps.meta.outputs.json).labels['org.opencontainers.image.revision'] }}
            NUGET_AUTH_TOKEN=${{ secrets.NUGET_AUTH_TOKEN }}

      - name: Output image details
        run: |
          echo "Image: ${{ inputs.image-name }}:${{ inputs.image-tag }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"
          echo "Metadata: ${{ steps.meta.outputs.json }}"
