---
name: Helm Chart - Lint, Test & Publish

on:
  workflow_call:

permissions:
  contents: write
  packages: write

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.16.2'

      - name: Lint chart
        run: |
          helm lint charts/project27

  checkov:
    name: Security Scan with Checkov
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.16.2'

      - name: Render templates
        run: |
          helm template project27 charts/project27 \
            --set auth.authority=https://ci-placeholder.example.com \
            > /tmp/rendered-manifests.yaml
          echo "Rendered manifests:"
          wc -l /tmp/rendered-manifests.yaml

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          file: /tmp/rendered-manifests.yaml
          framework: kubernetes
          soft_fail: false
          output_format: cli

  semver:
    name: Generate Version
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/semver-tag.yaml
    with:
      service-name: project27-chart

  package-publish:
    name: Package and Publish Chart
    if: github.ref == 'refs/heads/main'
    needs: [lint, checkov, semver]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: '3.16.2'

      - name: Package Helm chart
        run: |
          helm package charts/project27 --destination /tmp/ \
            --version "${{ needs.semver.outputs.version }}" \
            --app-version "${{ needs.semver.outputs.version }}"

          echo "Packaged chart:"
          ls -lh /tmp/*.tgz

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR
        run: |
          helm push /tmp/project27-${{ needs.semver.outputs.version }}.tgz \
            oci://ghcr.io/${{ github.repository_owner }}/helm-charts

          echo "Chart pushed to ghcr.io/${{ github.repository_owner }}/helm-charts/project27:${{ needs.semver.outputs.version }}"
