---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  dotnet:
    uses: ./.github/workflows/build-dotnet.yaml
    with:
      service-name: project27

  web:
    name: web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      result: ${{ steps.test.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'
      - run: npm ci
        working-directory: ./web
      - run: npm run build --if-present
        working-directory: ./web
      - run: npm run lint
        working-directory: ./web
      - id: test
        working-directory: ./web
        run: npm test

  docker-backend:
    uses: ./.github/workflows/ci-docker-template.yaml
    needs: [dotnet]
    with:
      service-name: 'project27-server'
      dockerfile-path: './src/Project27.Server/Dockerfile'
    permissions:
      contents: write
      packages: write
    secrets: inherit

  docker-web:
    uses: ./.github/workflows/ci-docker-template.yaml
    needs: [web]
    with:
      service-name: 'project27-web'
      dockerfile-path: './web/Dockerfile'
      build-context: './web'
    permissions:
      contents: write
      packages: write
    secrets: inherit
