---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET
    uses: ./.github/workflows/build-dotnet.yaml
    with:
      service-name: project27

  web:
    name: Web
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      result: ${{ steps.test.outcome }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 26.x
          cache: 'npm'
          cache-dependency-path: './web/package-lock.json'

      - name: Install dependencies
        working-directory: ./web
        run: npm ci

      - name: Build
        working-directory: ./web
        run: npm run build --if-present

      - name: Lint
        working-directory: ./web
        run: npm run lint

      - name: Test
        id: test
        working-directory: ./web
        run: npm test

  docker-backend:
    name: Docker Backend
    uses: ./.github/workflows/ci-docker-template.yaml
    needs: [dotnet]
    with:
      service-name: 'project27-server'
      dockerfile-path: './src/Project27.Server/Dockerfile'
    permissions:
      contents: write
      packages: write
    secrets: inherit

  docker-web:
    name: Docker Web
    uses: ./.github/workflows/ci-docker-template.yaml
    needs: [web]
    with:
      service-name: 'project27-web'
      dockerfile-path: './web/Dockerfile'
      build-context: './web'
    permissions:
      contents: write
      packages: write
    secrets: inherit

  helm:
    name: Helm
    uses: ./.github/workflows/helm.yaml
    needs: [docker-backend, docker-web]
    permissions:
      contents: write
      packages: write
