# Default values for project27.

image:
  registry: ghcr.io
  owner: "a-27m"
  tag: ""              # falls back to .Chart.AppVersion if empty
  pullPolicy: Always

# e.g. [{ name: ghcr-creds }] — GHCR images are typically private.
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

server:
  # No replicaCount here: it's fixed at 1 in templates/server-deployment.yaml.
  # Per-project checkout/edit locks and SSE fan-out live in server in-process
  # memory (docs/architecture.md D6), and SQLite isn't safe for concurrent
  # multi-process writers — both independently forbid running more than one
  # server pod at a time.
  resources: {}

  persistence:
    enabled: true
    # Set to reuse a pre-provisioned/pre-populated claim instead of creating one.
    existingClaim: ""
    size: 100Mi
    storageClassName: ""

  podSecurityContext:
    fsGroup: 1654

  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false

  probes:
    healthPath: /healthz
    startup:
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      periodSeconds: 10
      failureThreshold: 3
    readiness:
      periodSeconds: 10
      failureThreshold: 3

mcp:
  # p27-mcp over http (docs/spec/14-mcp-server.md "HTTP transport"): a ClusterIP Service in front
  # of a Deployment, unlike the stdio-only shape this used to have. Each MCP session forwards its
  # own caller's OIDC bearer token to the Project27 server (auth.authority/auth.audience below),
  # so -- unlike server/web -- there is no devAuth equivalent for it: devAuth.enabled has no effect
  # here, and a cluster with only devAuth configured must set mcp.enabled=false.
  enabled: true
  replicaCount: 1
  port: 5241

  # Streamable HTTP endpoint is mounted here instead of at "/" -- set this when an
  # external proxy in front of the Service addresses it by path prefix (e.g. it always
  # sends "<dns-name>:5241/mcp" and can't be told to rewrite/strip the suffix). Leave
  # empty to keep serving at root. /healthz is unaffected either way -- it's for
  # in-cluster k8s probes, not the proxy.
  pathPrefix: ""

  resources: {}

  podSecurityContext:
    fsGroup: 1654

  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false

  probes:
    healthPath: /healthz
    startup:
      failureThreshold: 30
      periodSeconds: 2
    liveness:
      periodSeconds: 10
      failureThreshold: 3
    readiness:
      periodSeconds: 10
      failureThreshold: 3

  # Remote-mode connection (Program.cs): defaults to the in-cluster server service. There is no
  # pre-selected project or fixed identity, unlike stdio's single-session shape -- every caller
  # opens or creates their own project via the open_project/create_project tools, authenticated as
  # themselves.
  server: ""    # falls back to the in-cluster server service if empty

  # RFC 9728 protected-resource metadata (docs/spec/14-mcp-server.md "OAuth discovery"): the
  # exact externally-visible URL this deployment is reachable at, including mcp.pathPrefix if
  # set -- the same address you'd hand to `claude mcp add` or Claude Desktop's custom-connector
  # dialog, e.g. "https://mcp.example.com/mcp/". Required for OAuth auto-discovery; leave empty
  # to keep the older manual-bearer-token-only flow (docs/spec/14-mcp-server.md "HTTP: session
  # bootstrap"). Also injected into the server Deployment as an additional accepted JWT audience
  # (server-deployment.yaml), since the same bearer token is forwarded downstream to it.
  resourceUrl: ""

  # OAuth client id to hand to MCP clients that don't support Dynamic Client Registration
  # (Claude Desktop's "Advanced settings", `claude mcp add --client-id`) -- surfaced in this
  # chart's NOTES.txt output. Defaults to the p27 CLI's own public/native Entra app registration
  # (src/Project27.Cli/appsettings.json CliClientId) so one native-app client covers the CLI and
  # MCP clients rather than provisioning a second registration; override if you want a dedicated
  # one, e.g. to register different loopback/callback redirect URIs separately.
  clientId: "cdbc8e29-1dee-4135-8e70-21a6fd332db0"

web:
  replicaCount: 2
  resources: {}

  # Runs on nginxinc/nginx-unprivileged, which listens on 8080 and starts as
  # uid 101 directly (no root, no setuid step), so it can run fully locked down.
  podSecurityContext: {}
  securityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false

# OIDC settings the server needs to start (decision D5). authority is required
# unless devAuth.enabled — `helm install` fails fast with a clear error rather
# than the server crash-looping on a startup InvalidOperationException.
auth:
  authority: ""
  audience: ""
  # Consumed by the web SPA via GET /api/auth/config (D5a) for its Authorization
  # Code + PKCE flow. scopes must include whatever scope the provider maps to
  # `audience`, or issued access tokens won't validate against it.
  clientId: ""
  scopes: "openid profile offline_access"

# Development-only auth (decision D5): auto-login via X-Dev-User, no OIDC
# provider needed. Enabling this also sets ASPNETCORE_ENVIRONMENT=Development,
# which additionally turns on the unauthenticated /openapi endpoint
# (Program.cs gates it on IsDevelopment()). Never enable on a
# publicly-reachable cluster.
devAuth:
  enabled: false
  # Overrides Auth:DevUsers (default alice/bob/carol from appsettings.json)
  # if non-empty.
  users: []

locking:
  staleAfterMinutes: 30

serviceAccount:
  create: true
  name: ""

# How external traffic reaches the web/server services.
#   istio:   Gateway + VirtualService (default) — needs Istio installed in-cluster.
#   ingress: plain networking.k8s.io/Ingress, ingress-nginx-flavored default
#            annotations (override via routing.ingress.annotations for other
#            controllers).
#   none:    no routing resource created; reach the services via port-forward
#            or your own routing.
routing:
  provider: istio
  host: project27.example.com

  istio:
    tls:
      enabled: false
      # Name of the Istio-mesh TLS secret (e.g. provisioned by cert-manager)
      # to terminate at the gateway. Required when tls.enabled=true.
      credentialName: ""

  ingress:
    className: nginx
    annotations: {}
    tls: []
